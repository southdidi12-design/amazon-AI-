<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Amazon Ads Monitor</title>
    <style>
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
  </head>
  <body>
    <h1>亚马逊广告监控</h1>
    <button id="run">立即运行 AI 优化</button>
    <h2>最近的报告</h2>
    <div id="reports"></div>

    <script>
      async function fetchReports(){
        const res = await fetch('/api/reports/');
        const data = await res.json();
        const container = document.getElementById('reports');
        if(!data.length){ container.innerHTML = '<p>暂无报告。</p>'; return; }
        let html = '';
        data.forEach(r => {
          html += `<h3>报告 ${r.id} - ${r.created_at}</h3>`;
          html += '<table><tr><th>关键词</th><th>匹配</th><th>花费</th><th>销售额</th><th>ACOS</th><th>当前出价</th><th>建议出价</th><th>操作</th></tr>';
          r.data.forEach(row=>{
            html += '<tr>' +
              `<td>${row.keyword}</td>`+
              `<td>${row.match_type}</td>`+
              `<td>${row.spend}</td>`+
              `<td>${row.sales}</td>`+
              `<td>${row.acos}</td>`+
              `<td>${row.current_bid}</td>`+
              `<td>${row.new_bid}</td>`+
              `<td>${row.action}</td>`+
              '</tr>';
          });
          html += '</table>';
        });
        container.innerHTML = html;
      }

      document.getElementById('run').addEventListener('click', async ()=>{
        document.getElementById('run').disabled = true;
        await fetch('/api/run/', { method: 'POST' });
        await fetchReports();
        document.getElementById('run').disabled = false;
      });

      fetchReports();
    </script>
  </body>
</html>
